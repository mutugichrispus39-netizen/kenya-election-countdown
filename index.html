<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kenya General Election Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:url("https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
transition:.4s;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.65);
}

.container{

position:relative;
z-index:2;
width:90%;
max-width:900px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
text-align:center;
animation:fadeIn 2.5s;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.flag{

font-size:70px;
margin-bottom:10px;
animation:wave 0.01s infinite;

}

@keyframes wave{

0%{transform:rotate(0deg);}
25%{transform:rotate(8deg);}
50%{transform:rotate(0deg);}
75%{transform:rotate(-8deg);}
100%{transform:rotate(0deg);}

}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
opacity:.9;
margin-bottom:15px;
}

.clock{

font-size:22px;
margin-bottom:30px;
color:#FFD700;

}

.countdown{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;

}

.box{

background:white;
color:#111;
padding:20px;
border-radius:15px;
transition:.3s;
}

.box:hover{

transform:translateY(-10px);

}

.box h2{

font-size:55px;
color:#008000;

}

.box p{

font-weight:bold;

}

.progress{

margin-top:35px;

}

.progress-bar{

width:100%;
height:18px;
background:#ddd;
border-radius:30px;
overflow:hidden;

}

.progress-fill{

height:100%;
width:0%;
background:linear-gradient(to right,#000,#006400,#bb0000);
transition:1s;

}

#percentage{

margin-top:10px;
font-size:18px;

}

button{

margin-top:30px;
padding:12px 30px;
font-size:16px;
border:none;
border-radius:30px;
cursor:pointer;
background:#00aa44;
color:white;
transition:.3s;

}

button:hover{

background:#007733;

}

footer{

margin-top:30px;
font-size:14px;
opacity:.8;

}

.dark{

background:#111;

}

.dark .container{

background:rgba(0,0,0,.55);

}

@media(max-width:700px){

.countdown{

grid-template-columns:repeat(2,1fr);

}

h1{

font-size:30px;

}

}

@media(max-width:500px){

.countdown{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<div class="flag">🇰🇪</div>

<h1>The Journey To Sugoi</h1>
<h2>Ruto Must Go, He Has To</h2>

<div class="subtitle">
Countdown to 11 August 2027
</div>

<div class="clock" id="clock"></div>

<div class="countdown">

<div class="box">
<h2 id="days">0</h2>
<p>Days</p>
</div>

<div class="box">
<h2 id="hours">0</h2>
<p>Hours</p>
</div>

<div class="box">
<h2 id="minutes">0</h2>
<p>Minutes</p>
</div>

<div class="box">
<h2 id="seconds">0</h2>
<p>Seconds</p>
</div>

</div>

<div class="progress">

<div class="progress-bar">

<div class="progress-fill" id="fill"></div>

</div>

<div id="percentage"></div>

</div>

<button onclick="toggleMode()">
🌙 Toggle Theme
</button>

<footer>

Election Date: <strong>11th Day of August 2027</strong><br><br>

This website was created to show the number of days left until the Sugoi Thug goes home..

</footer>

</div>

<script>

const election = new Date("August 11,2027 06:00:00").getTime();

const previousElection = new Date("August 9,2022").getTime();

function countdown(){

const now = new Date().getTime();

const diff = election-now;

const d=Math.floor(diff/(1000*60*60*24));

const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const m=Math.floor((diff%(1000*60*60))/(1000*60));

const s=Math.floor((diff%(1000*60))/1000);

days.innerHTML=d;
hours.innerHTML=h;
minutes.innerHTML=m;
seconds.innerHTML=s;

let percent=((now-previousElection)/(election-previousElection))*100;

percent=Math.min(100,Math.max(0,percent));

fill.style.width=percent+"%";

percentage.innerHTML=percent.toFixed(1)+"% of the journey to Election Day completed.";

if(diff<0){

document.querySelector(".container").innerHTML="<h1>🗳️ Today is Election Day!</h1>";

}

}

setInterval(countdown,1000);

countdown();

function kenyaClock(){

const options={
timeZone:"Africa/Nairobi",
hour:"2-digit",
minute:"2-digit",
second:"2-digit",
weekday:"long",
day:"numeric",
month:"long",
year:"numeric"
};

clock.innerHTML="🕒 "+new Date().toLocaleString("en-KE",options)+" (EAT)";

}

setInterval(kenyaClock,1000);

kenyaClock();

function toggleMode(){

document.body.classList.toggle("dark");

}

</script>

</body>
</html>
